<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouquet Studio | Hardware Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;900&family=Dancing+Script:wght@600&display=swap');
        
        :root { --m-x: 50%; --m-y: 50%; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: #e9e4d1; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .grid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: radial-gradient(circle at 2px 2px, #bcbaaf 2px, transparent 0); background-size: 40px 40px; pointer-events: none; z-index: 0; }
        .section { position: relative; z-index: 10; min-height: 100vh; padding: 1rem; display: flex; flex-direction: column; }

        /* CARD STYLING */
        .card-container { perspective: 1000px; width: 140px; height: 190px; transition: transform 0.1s ease-out; margin: auto; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card-container:hover .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 3px solid black; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px; box-shadow: 6px 6px 0px 0px rgba(0,0,0,1); }
        .card-back { transform: rotateY(180deg); background-color: white; justify-content: center; text-align: center; font-size: 10px; font-weight: 500; }
        .selected .card-front { border-color: #ff4d4d; box-shadow: 6px 6px 0px 0px #ff4d4d; }

        /* BUILDER BOX */
        .builder-outer {
            background: #2d1b2d; border: 4px solid black; border-radius: 24px;
            display: flex; flex-direction: column; width: 100%; max-width: 1000px;
            margin: auto; box-shadow: 0px 10px 0px 0px rgba(0,0,0,1); overflow: hidden;
            transition: all 0.5s ease;
        }
        .canvas-area { 
            background: #eef4ff; border: 4px solid black; border-radius: 12px; 
            margin: 15px; height: 380px; position: relative; display: flex; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        /* MESSAGE CARD LOGIC */
        #bouquet-wrapper { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .gift-card {
            position: absolute; right: -320px; width: 260px; height: 180px;
            background: white; border: 3px solid black; border-radius: 8px;
            box-shadow: 6px 6px 0px 0px black; padding: 15px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform: rotate(2deg);
            z-index: 60; display: flex; flex-direction: column;
        }
        .show-msg #bouquet-wrapper { transform: translateX(-120px) scale(0.9); }
        .show-msg .gift-card { right: 30px; }
        
        /* INPUT STYLING FOR CARD */
        .card-input { background: transparent; border: none; outline: none; width: 100%; color: black; }
        .card-input::placeholder { color: #888; }
        .handwriting { font-family: 'Dancing Script', cursive; font-size: 1.1rem; border: none; background: transparent; width: 100%; flex-grow: 1; resize: none; outline: none; margin-top: 5px; }

        /* CHIN */
        .builder-chin { background: #2d1b2d; padding: 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .neo-btn { background: white; border: 2px solid black; font-weight: 900; box-shadow: 3px 3px 0px 0px black; transition: 0.1s; text-transform: uppercase; font-size: 9px; padding: 8px 6px; }
        .neo-btn:active { box-shadow: 0px 0px 0px 0px black; transform: translate(2px, 2px); }
        .asset-controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; flex-grow: 1; }
        .arrangement-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 9px; line-height: 1.1; background: #ff4d4d; color: white; border: 3px solid black; box-shadow: 3px 3px 0px 0px black; flex-shrink: 0; }

        @media (min-width: 768px) {
            .builder-outer { height: 85vh; }
            .canvas-area { flex-grow: 1; height: auto; }
            .builder-chin { padding: 20px 40px; height: 110px; }
            .asset-controls { display: flex; gap: 15px; }
            .neo-btn { font-size: 11px; padding: 10px 20px; }
            .arrangement-btn { width: 95px; height: 95px; font-size: 11px; }
            .show-msg #bouquet-wrapper { transform: translateX(-180px); }
            .show-msg .gift-card { right: 80px; width: 300px; height: 220px; }
        }

        /* --- FIXED LAYOUT ENGINE FOR BOUQUET --- */
        #bouquet-container { 
            position: relative; 
            width: 400px; 
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #wrap-img, #bush-img, #ribbon-img, #flower-layer {
            position: absolute;
            left: 50%;
            top: 55%; 
            transform: translate(-50%, -50%);
        }

        #wrap-img { width: 320px; z-index: 10; }
        #bush-img { width: 300px; z-index: 20; margin-top: -60px; }
        #flower-layer { width: 100%; height: 100%; z-index: 30; pointer-events: none; }
        #ribbon-img { width: 80px; z-index: 40; margin-top: 80px; }

        .placed-flower { 
            position: absolute; 
            width: 150px; 
            left: 50%; 
            top: 50%; 
            margin-left: -75px; 
            margin-top: -75px;
            object-fit: contain;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flower-counter { position: absolute; top: 15px; left: 10px; background: white; border: 2px solid black; padding: 4px 10px; font-weight: 900; z-index: 50; transform: rotate(-2deg); box-shadow: 3px 3px 0px 0px black; font-size: 11px; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div id="selection-section" class="section">
        <header class="mb-10"><h1 class="text-2xl font-black italic uppercase">Bouquet Studio</h1></header>
        <div class="max-w-6xl mx-auto mb-auto">
            <h2 class="text-2xl font-black uppercase mb-8">Choose your flowers</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="flower-grid"></div>
        </div>
        <div class="flex justify-center mt-10">
            <button onclick="scrollToBuilder()" class="neo-btn px-10 py-3 text-lg">CONTINUE ➔</button>
        </div>
    </div>

    <div id="builder-section" class="section">
        <div class="builder-outer" id="main-builder">
            <div class="canvas-area">
                <div class="flower-counter" id="flower-counter">FLOWERS: 0</div>
                
                <div id="bouquet-wrapper">
                    <div id="bouquet-container">
                        <img id="wrap-img" src="wrapping.png" alt="wrap">
                        <img id="bush-img" src="bush.png" alt="greenery">
                        <div id="flower-layer"></div>
                        <img id="ribbon-img" src="ribbon.png" alt="ribbon">
                    </div>
                </div>

                <div class="gift-card">
                    <input type="text" class="card-input text-[10px] font-black uppercase" value="To: Dear Someone" placeholder="To: ...">
                    <textarea class="handwriting" placeholder="Write your message here..."></textarea>
                    <input type="text" class="card-input text-[10px] font-black text-right italic" value="- Your Lovely" placeholder="From: ...">
                </div>
            </div>

            <div class="builder-chin">
                <div class="asset-controls">
                    <button onclick="changeAsset('wrap')" class="neo-btn">WRAP</button>
                    <button onclick="changeAsset('bush')" class="neo-btn">BUSH</button>
                    <button onclick="changeAsset('ribbon')" class="neo-btn">RIBBON</button>
                    <button onclick="toggleMessage()" class="neo-btn bg-cyan-300">MESSAGE</button>
                    <button onclick="arrangeEverything()" class="neo-btn bg-yellow-300">ARRANGE</button>
                </div>
                <button onclick="resetBouquet()" class="arrangement-btn uppercase font-black">RESET</button>
            </div>
        </div>
    </div>

    <script>
        const FLOWERS = [
            { id: 'rose', name: 'Rose', color: '#ff9494', img: 'rose.png' },
            { id: 'sunflower', name: 'Sunflower', color: '#ffdb58', img: 'sunflower .png' },
            { id: 'tulip', name: 'Tulip', color: '#ffb7ff', img: 'tulip .png' },
            { id: 'lily', name: 'Lily', color: '#ffffff', img: 'lily.png' },
            { id: 'carnation', name: 'Carnation', color: '#ffcaaf', img: 'carnation .png' },
            { id: 'orchid', name: 'Orchid', color: '#c3aaff', img: 'orchid.png' }
        ];

        let selected = new Set();
        let wrapIdx = 1, bushIdx = 1, ribbonIdx = 1;

        const grid = document.getElementById('flower-grid');
        FLOWERS.forEach(f => {
            const wrap = document.createElement('div');
            wrap.className = 'card-container';
            wrap.innerHTML = `<div class="card-inner"><div class="card-front" style="background-color: ${f.color}"><img src="${f.img}" class="w-full h-24 object-contain"><p class="font-black italic text-sm">${f.name}</p></div><div class="card-back">Meaning of ${f.name}</div></div>`;
            wrap.addEventListener('click', () => {
                if(selected.has(f.id)) {
                    selected.delete(f.id); document.getElementById(`f-${f.id}`)?.remove();
                } else {
                    selected.add(f.id);
                    const img = document.createElement('img');
                    img.src = f.img; img.id = `f-${f.id}`; img.className = 'placed-flower';
                    
                    // Initial position before arrange
                    const x = (Math.random() - 0.5) * 120; 
                    const y = (Math.random() - 0.5) * 80 - 30; 
                    const rotate = (Math.random() - 0.5) * 50;
                    img.style.transform = `translate(${x}px, ${y}px) rotate(${rotate}deg)`;
                    
                    document.getElementById('flower-layer').appendChild(img);
                }
                wrap.classList.toggle('selected');
                updateFlowerCount();
            });
            grid.appendChild(wrap);
        });

        function toggleMessage() { document.getElementById('main-builder').classList.toggle('show-msg'); }

        function changeAsset(type) {
            const imgId = type === 'wrap' ? 'wrap-img' : (type === 'bush' ? 'bush-img' : 'ribbon-img');
            const fileBase = type === 'wrap' ? 'wrapping' : (type === 'bush' ? 'bush' : 'ribbon');
            if(type === 'wrap') wrapIdx = (wrapIdx % 5) + 1;
            else if(type === 'bush') bushIdx = (bushIdx % 5) + 1;
            else ribbonIdx = (ribbonIdx % 5) + 1;
            let idx = type === 'wrap' ? wrapIdx : (type === 'bush' ? bushIdx : ribbonIdx);
            document.getElementById(imgId).src = idx === 1 ? `${fileBase}.png` : `${fileBase}${idx}.png`;
        }

        function arrangeEverything() {
            const flowers = document.querySelectorAll('.placed-flower');
            flowers.forEach((img) => {
                const x = (Math.random() - 0.5) * 120; 
                const y = (Math.random() - 0.5) * 80 - 30; 
                const rotate = (Math.random() - 0.5) * 50; 
                const scale = 0.9 + (Math.random() * 0.2); 
                
                img.style.transform = `translate(${x}px, ${y}px) rotate(${rotate}deg) scale(${scale})`;
            });
        }

        function resetBouquet() {
            selected.clear();
            document.getElementById('flower-layer').innerHTML = '';
            document.querySelectorAll('.card-container').forEach(card => card.classList.remove('selected'));
            updateFlowerCount();
            document.getElementById('main-builder').classList.remove('show-msg');
            
            // Text inputs တွေကိုပါ default ပြန်ထားချင်ရင်
            const inputs = document.querySelectorAll('.card-input');
            inputs[0].value = "To: Dear Someone";
            inputs[1].value = "- Your Lovely";
            document.querySelector('.handwriting').value = '';
        }

        function updateFlowerCount() { document.getElementById('flower-counter').textContent = `FLOWERS: ${selected.size}`; }
        function scrollToBuilder() { document.getElementById('builder-section').scrollIntoView({ behavior: 'smooth' }); }
    </script>
</body>
</html>
